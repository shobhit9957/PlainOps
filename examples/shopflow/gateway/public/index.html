<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopFlow · 7-microservice store</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #0b1120; color: #e2e8f0; padding: 32px 16px; }
      .w { max-width: 900px; margin: 0 auto; }
      h1 { margin: 0 0 4px; } .s { color: #94a3b8; margin-bottom: 24px; font-size: .9rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
      .card { background: #131c31; border: 1px solid #263354; border-radius: 12px; padding: 14px; }
      .card h3 { margin: 0 0 4px; font-size: 1rem; } .price { color: #4ade80; font-weight: 700; }
      button { cursor: pointer; border: none; border-radius: 8px; padding: 8px 12px; background: #38bdf8; color: #06121f; font-weight: 600; margin-top: 8px; width: 100%; }
      .row { display: flex; gap: 20px; margin-top: 28px; flex-wrap: wrap; }
      .panel { flex: 1; min-width: 260px; background: #131c31; border: 1px solid #263354; border-radius: 12px; padding: 16px; }
      .panel h2 { margin: 0 0 12px; font-size: .95rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
      ul { list-style: none; padding: 0; margin: 0; } li { padding: 6px 0; border-bottom: 1px solid #263354; font-size: .9rem; }
      .badge { padding: 2px 8px; border-radius: 999px; font-size: .72rem; } .PAID { background: #12331c; color: #4ade80; } .PAYMENT_FAILED { background: #3a1414; color: #f87171; } .CREATED { background: #3a2f14; color: #fbbf24; }
      .foot { color: #475569; font-size: .78rem; margin-top: 24px; }
    </style>
  </head>
  <body>
    <div class="w">
      <h1>🛍️ ShopFlow</h1>
      <div class="s">A 7-microservice store: gateway · users · products · cart · orders · payments · notifications — all on MongoDB.</div>
      <div class="grid" id="catalog"></div>
      <div class="row">
        <div class="panel"><h2>Your cart</h2><ul id="cart"></ul><button id="checkout">Checkout</button></div>
        <div class="panel"><h2>Orders</h2><ul id="orders"></ul></div>
      </div>
      <div class="foot">Deployed by PLAINOPS ⚓ · demo user: <code id="uid"></code></div>
    </div>
    <script>
      const uid = 'u_' + Math.random().toString(36).slice(2, 8);
      document.getElementById('uid').textContent = uid;
      const api = (m, p, b) => fetch('/api' + p, { method: m, headers: b ? { 'content-type': 'application/json' } : undefined, body: b ? JSON.stringify(b) : undefined }).then((r) => r.json());

      async function loadCatalog() {
        const products = await api('GET', '/products/products');
        document.getElementById('catalog').innerHTML = products.map((p) =>
          `<div class="card"><h3>${p.name}</h3><div class="price">$${p.price}</div>
           <button onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Add to cart</button></div>`).join('');
      }
      async function addToCart(p) {
        await api('POST', '/cart/cart/' + uid + '/items', { productId: p._id, name: p.name, price: p.price, quantity: 1 });
        loadCart();
      }
      async function loadCart() {
        const cart = await api('GET', '/cart/cart/' + uid);
        document.getElementById('cart').innerHTML = (cart.items || []).map((i) => `<li>${i.name} — $${i.price}</li>`).join('') || '<li>empty</li>';
      }
      async function loadOrders() {
        const orders = await api('GET', '/orders/orders?userId=' + uid);
        document.getElementById('orders').innerHTML = orders.map((o) => `<li>$${o.total} <span class="badge ${o.status}">${o.status}</span></li>`).join('') || '<li>none yet</li>';
      }
      document.getElementById('checkout').addEventListener('click', async () => {
        const cart = await api('GET', '/cart/cart/' + uid);
        if (!cart.items || !cart.items.length) return;
        await api('POST', '/orders/orders', { userId: uid, items: cart.items });
        await api('DELETE', '/cart/cart/' + uid);
        loadCart(); loadOrders();
      });
      loadCatalog(); loadCart(); loadOrders(); setInterval(loadOrders, 5000);
    </script>
  </body>
</html>
