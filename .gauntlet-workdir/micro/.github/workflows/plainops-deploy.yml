# Generated by PlainOps — deploy-on-push for "gtl-shop"
# Add repo secret(s): AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY (an IAM user scoped to this app) — then every push to main ships automatically.
name: Deploy gtl-shop
on:
  push:
    branches: [main]
concurrency: deploy-gtl-shop
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, service01, service02]
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE=659587495971.dkr.ecr.ap-south-1.amazonaws.com/po-gtl-shop-${{ matrix.service }}:live
          docker build -t "$IMAGE" ${{ matrix.service }}
          docker push "$IMAGE"
      - name: Roll the service
        run: aws ecs update-service --cluster po-gtl-shop --service ${{ matrix.service }} --force-new-deployment
